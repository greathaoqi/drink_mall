<!DOCTYPE html>
<html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1400">
  <title>醇品汇 · 高保真设计稿</title>
  <style>/* 醇品汇 — Mini-program design tokens & primitives */

:root {
  /* Brand colors — sampled from references */
  --brown-900: #1F0900;
  --brown-800: #2A0E00;
  --brown-700: #351300;
  --brown-600: #4A1E08;
  --brown-50: #FFF8EE;

  --gold-500: #D38A00;
  --gold-600: #B07000;
  --gold-400: #E4A516;
  --gold-300: #F0BC4A;
  --gold-200: #FFD646;
  --gold-100: #FBE9B6;
  --gold-50: #FFF6DA;

  --cream-100: #F8F4EC;
  --cream-200: #F2EBD9;
  --cream-50: #FCFAF3;
  --bg-app: #F7F3EA;
  --bg-card: #FFFFFF;
  --line: #ECE5D6;
  --line-soft: #F0EADC;

  --text-1: #1A1006;
  --text-2: #5E5142;
  --text-3: #9B8E7C;
  --text-on-brown: #F6E7C2;
  --text-on-brown-soft: rgba(246,231,194,0.6);

  --green-wechat: #12B95B;
  --green-wechat-2: #0FA34F;

  --blue-50: #E8EFFD;
  --blue-500: #3A6FD1;
  --pink-50: #FCE4EC;
  --pink-500: #D1467A;
  --green-50: #E4F3E7;
  --green-500: #2F9E5C;
  --red-500: #D6453B;

  /* Gradients */
  --grad-brown: linear-gradient(180deg, #2A0E00 0%, #3B1900 60%, #421E04 100%);
  --grad-gold: linear-gradient(135deg, #FFD646 0%, #E4A516 50%, #B07000 100%);
  --grad-gold-soft: linear-gradient(135deg, #FBE9B6, #F0BC4A);
  --grad-card-cream: linear-gradient(180deg, #FFFAEB, #FFF1D2);

  /* Radii */
  --r-xs: 6px;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 22px;
  --r-pill: 999px;

  /* Shadows */
  --shadow-card: 0 2px 10px rgba(40,20,0,0.06);
  --shadow-pop: 0 12px 40px rgba(30,15,0,0.18);

  --safe-bottom: 24px;
  --tabbar-h: 64px;
  --nav-h: 44px;
  --status-h: 44px;
}

/* Reset within phone frames */
.cp-screen, .cp-screen * {
  box-sizing: border-box;
  -webkit-font-smoothing: antialiased;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
               "Microsoft YaHei", "Source Han Sans CN", sans-serif;
}

.cp-screen {
  width: 390px;
  height: 844px;
  background: var(--bg-app);
  position: relative;
  overflow: hidden;
  color: var(--text-1);
  font-size: 14px;
  line-height: 1.45;
}

/* Status bar */
.cp-status {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px 0 28px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.2px;
  position: relative;
  z-index: 5;
}
.cp-status.dark { color: #fff; }
.cp-status.light { color: #1A1006; }
.cp-status .icons {
  display: flex; gap: 6px; align-items: center;
}
.cp-status .icons svg { display: block; }

/* Navigation bar (under status) */
.cp-nav {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  font-size: 17px;
  font-weight: 600;
  position: relative;
}
.cp-nav .nav-left, .cp-nav .nav-right {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  display: flex; gap: 14px;
  align-items: center;
}
.cp-nav .nav-left { left: 14px; }
.cp-nav .nav-right { right: 14px; }
.cp-nav.on-brown { color: #F6E7C2; }
.cp-nav.on-light { color: #1A1006; }

/* TabBar */
.cp-tabbar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 76px;
  background: #fff;
  border-top: 1px solid var(--line-soft);
  display: flex;
  padding-bottom: 14px;
  z-index: 4;
}
.cp-tabbar .tab {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  font-size: 11px;
  color: #9B8E7C;
  position: relative;
}
.cp-tabbar .tab .ico {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s ease;
}
.cp-tabbar .tab.active { color: var(--gold-500); font-weight: 600; }
.cp-tabbar .tab.active .ico { background: #FBE9B6; }
.cp-tabbar .tab.active .ico svg { stroke: var(--gold-500); }

/* Buttons */
.btn-gold {
  background: var(--grad-gold);
  color: #3A1A00;
  border: none;
  border-radius: var(--r-pill);
  font-weight: 700;
  font-size: 16px;
  height: 48px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 28px;
  box-shadow: 0 6px 18px rgba(211,138,0,0.28);
  cursor: pointer;
}
.btn-gold-outline {
  background: var(--gold-50);
  color: var(--gold-500);
  border: 1px solid #F2D78A;
  border-radius: var(--r-pill);
  font-weight: 600;
  font-size: 15px;
  height: 46px;
  padding: 0 22px;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.btn-wechat {
  background: var(--green-wechat);
  color: #fff;
  border: none;
  border-radius: var(--r-pill);
  font-weight: 600;
  font-size: 16px;
  height: 48px;
  padding: 0 28px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 6px 18px rgba(18,185,91,0.25);
  cursor: pointer;
}

/* Chips / tags */
.tag {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: var(--r-xs);
  font-weight: 500;
}
.tag-gold { background: var(--gold-50); color: var(--gold-600); }
.tag-blue { background: var(--blue-50); color: var(--blue-500); }
.tag-pink { background: var(--pink-50); color: var(--pink-500); }
.tag-green { background: var(--green-50); color: var(--green-500); }
.tag-gold-solid {
  background: var(--grad-gold);
  color: #3A1A00;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: var(--r-xs);
}

/* Cards */
.card {
  background: #fff;
  border-radius: var(--r-md);
  box-shadow: var(--shadow-card);
}

.divider { height: 1px; background: var(--line); }

/* Brown header */
.brown-header {
  background: var(--grad-brown);
  color: #F6E7C2;
}

/* Price */
.price {
  color: var(--gold-500);
  font-weight: 800;
  font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
}
.price .sym { font-size: 0.65em; margin-right: 2px; font-weight: 700; }

/* Product card */
.prod-card {
  background: #fff;
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  display: flex;
  flex-direction: column;
}
.prod-card .pimg {
  aspect-ratio: 1/1;
  background: #f2ede4 center/cover no-repeat;
  position: relative;
}
.prod-card .pmeta {
  padding: 8px 10px 12px;
}
.prod-card .pname {
  font-size: 13px;
  line-height: 1.35;
  color: var(--text-1);
  font-weight: 500;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 35px;
}
.prod-card .pcart {
  position: absolute;
  right: 8px; bottom: 8px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--grad-gold);
  display: flex; align-items: center; justify-content: center;
  color: #3A1A00;
  font-weight: 700; font-size: 18px;
  box-shadow: 0 4px 10px rgba(211,138,0,0.35);
}

/* Floating CS */
.fab-cs {
  position: absolute;
  right: 14px; bottom: 96px;
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--grad-gold);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 20px rgba(211,138,0,0.35);
  z-index: 3;
  color: #3A1A00;
}

/* Section title */
.sec-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 700;
  color: var(--text-1);
  padding: 14px 16px 10px;
}
.sec-title .bar {
  width: 4px; height: 16px; border-radius: 2px;
  background: var(--grad-gold);
}
.sec-title .more {
  margin-left: auto;
  font-size: 12px; font-weight: 400;
  color: var(--text-3);
}

/* Avatars */
.avatar {
  border-radius: 50%;
  background: var(--cream-200) center/cover no-repeat;
  overflow: hidden;
  display: inline-flex; align-items: center; justify-content: center;
  color: #B07000;
  font-weight: 600;
}

/* Scrollbar hidden by default in screens */
.cp-screen *::-webkit-scrollbar { display: none; }
.cp-screen * { scrollbar-width: none; }

/* Bottom safe area indicator */
.home-indicator {
  position: absolute;
  bottom: 6px; left: 50%;
  transform: translateX(-50%);
  width: 134px; height: 5px;
  border-radius: 3px;
  background: rgba(0,0,0,0.35);
}
.cp-screen.dark-indicator .home-indicator { background: rgba(255,255,255,0.4); }

/* Bottom sheet overlay */
.sheet-mask {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 8;
}
.sheet {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 18px 16px calc(28px + var(--safe-bottom));
  z-index: 9;
  max-height: 90%;
  overflow: auto;
}

/* Modal */
.modal-mask {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 8;
}
.modal {
  width: 300px;
  background: #fff;
  border-radius: 14px;
  padding: 22px 20px 0;
  text-align: center;
}
.modal .modal-actions {
  display: flex;
  margin: 18px -20px 0;
  border-top: 1px solid var(--line);
}
.modal .modal-actions button {
  flex: 1;
  height: 48px;
  border: none; background: transparent;
  font-size: 16px;
  color: var(--text-2);
  font-weight: 500;
  cursor: pointer;
}
.modal .modal-actions button + button {
  border-left: 1px solid var(--line);
  color: var(--gold-500);
  font-weight: 600;
}

/* Empty state */
.empty {
  display: flex; flex-direction: column;
  align-items: center;
  padding: 60px 24px;
  color: var(--text-3);
}
.empty .empty-icon {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: var(--cream-100);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  color: var(--gold-300);
}
.empty .empty-text {
  font-size: 14px;
  margin-bottom: 16px;
}

/* Utility */
.text-gold { color: var(--gold-500); }
.text-2 { color: var(--text-2); }
.text-3 { color: var(--text-3); }
.font-num {
  font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
  font-feature-settings: "tnum";
}
.fw-7 { font-weight: 700; }
.fw-6 { font-weight: 600; }
.fw-5 { font-weight: 500; }

/* Search bar */
.searchbar {
  display: flex;
  align-items: center;
  height: 36px;
  border-radius: var(--r-pill);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.7);
  padding: 0 14px;
  font-size: 13px;
  gap: 8px;
}
.searchbar.light {
  background: #F4EEDF;
  border: 1px solid var(--line);
  color: var(--text-3);
}

/* Progress */
.bar-track {
  height: 8px; border-radius: 4px;
  background: rgba(255,255,255,0.12);
  overflow: hidden;
}
.bar-track .fill {
  height: 100%;
  background: var(--grad-gold);
  border-radius: 4px;
}

/* form row */
.form-row {
  display: flex; align-items: center;
  min-height: 52px;
  padding: 12px 16px;
  background: #fff;
  border-bottom: 1px solid var(--line-soft);
  font-size: 14px;
}
.form-row .label {
  width: 80px; color: var(--text-2);
  font-size: 14px;
  flex-shrink: 0;
}
.form-row .field { flex: 1; }
.form-row input, .form-row textarea {
  width: 100%; border: none; outline: none;
  font-size: 14px; color: var(--text-1);
  background: transparent;
  font-family: inherit;
}

/* link row (settings/menu) */
.row-link {
  background: #fff;
  padding: 14px 16px;
  display: flex; align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 15px;
  color: var(--text-1);
}
.row-link .row-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--gold-50);
  color: var(--gold-500);
  display: flex; align-items: center; justify-content: center;
}
.row-link .row-arrow {
  margin-left: auto;
  color: #C9BFA9;
}
.row-link .row-val {
  margin-left: auto; color: var(--text-3); font-size: 13px;
}
</style>
