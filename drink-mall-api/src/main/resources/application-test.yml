server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:drink_mall_test}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:1}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

sa-token:
  is-log: true
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET:drink-mall-test-jwt-secret-key-change-me}

wx:
  miniapp:
    appid: ${WX_MINIAPP_APPID:test-miniapp-appid}
    secret: ${WX_MINIAPP_SECRET:test-miniapp-secret}

logging:
  level:
    com.drinkmall: debug
    me.chanjar.weixin: warn
