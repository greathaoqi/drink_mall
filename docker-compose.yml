services:
  redis:
    image: redis:7.2-alpine
    container_name: drink-mall-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - drink-mall-network

  backend:
    build:
      context: ./drink-mall-api
      dockerfile: Dockerfile
    container_name: drink-mall-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://drink-mall-mysql:3306/drink_mall?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - drink-mall-network
    extra_hosts:
      - "drink-mall-mysql:172.21.0.2"

  admin:
    build:
      context: ./drink-mall-admin
      dockerfile: Dockerfile
    container_name: drink-mall-admin
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - drink-mall-network

volumes:
  redis_data:

networks:
  drink-mall-network:
    name: drink-mall_default
    external: true