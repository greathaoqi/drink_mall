services:
  mysql:
    image: docker.1ms.run/library/mysql:8.0
    container_name: drink-mall-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: drink_mall
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - drink-mall-network

  redis:
    image: docker.1ms.run/library/redis:7.2-alpine
    container_name: drink-mall-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - drink-mall-network

  backend:
    build:
      context: ./drink-mall-api
      dockerfile: Dockerfile
    container_name: drink-mall-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_ADDRESS: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: drink_mall
      DB_USERNAME: root
      DB_PASSWORD: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
    ports:
      - "0.0.0.0:18080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - drink-mall-network

  admin:
    build:
      context: ./drink-mall-admin
      dockerfile: Dockerfile
    container_name: drink-mall-admin
    restart: unless-stopped
    ports:
      - "0.0.0.0:13001:80"
    depends_on:
      - backend
    networks:
      - drink-mall-network

  caddy:
    image: docker.1ms.run/library/caddy:2-alpine
    container_name: drink-mall-caddy
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - admin
    networks:
      - drink-mall-network

volumes:
  mysql_data:
    name: drink-mall_mysql_data
  redis_data:
  caddy_data:
  caddy_config:

networks:
  drink-mall-network:
    driver: bridge
